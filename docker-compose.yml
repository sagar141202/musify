services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soundfree
      POSTGRES_USER: soundfree
      POSTGRES_PASSWORD: soundfree
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
